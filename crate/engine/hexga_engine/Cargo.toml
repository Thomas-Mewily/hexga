[package]
name = "hexga_engine"
version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
edition.workspace = true
readme = "README.md"

description = "A multimedia game and software engine for handling graphics, audio, and input."
keywords = ["game", "engine", "multimedia", "graphics", "software"]
categories = ["game-engines", "game-development", "graphics", "games"]

[features]
default = [
            "int_are_32_bits", "float_are_32_bits",
            "serde", "serde_rc", "hexga_encoding_derive"
          ]



int_are_8_bits    = ["hexga/int_are_8_bits", "hexga_graphics/int_are_8_bits", "hexga_event_loop/int_are_8_bits"]
int_are_16_bits   = ["hexga/int_are_16_bits", "hexga_graphics/int_are_16_bits", "hexga_event_loop/int_are_16_bits"]
int_are_32_bits   = ["hexga/int_are_32_bits", "hexga_graphics/int_are_32_bits", "hexga_event_loop/int_are_32_bits"]
int_are_64_bits   = ["hexga/int_are_64_bits", "hexga_graphics/int_are_64_bits", "hexga_event_loop/int_are_64_bits"]
int_are_size_bits = ["hexga/int_are_size_bits", "hexga_graphics/int_are_size_bits", "hexga_event_loop/int_are_size_bits"]

float_are_32_bits   = ["hexga/float_are_32_bits", "hexga_graphics/float_are_32_bits", "hexga_event_loop/float_are_32_bits"]
float_are_64_bits   = ["hexga/float_are_64_bits", "hexga_graphics/float_are_64_bits", "hexga_event_loop/float_are_64_bits"]
float_are_size_bits = ["hexga/float_are_size_bits", "hexga_graphics/float_are_size_bits", "hexga_event_loop/float_are_size_bits"]

serde = ["dep:serde", "hexga/serde", "hexga_graphics/serde", "hexga_event_loop/serde"]
serde_rc = ["serde/rc", "hexga/serde_rc", "hexga_graphics/serde_rc", "hexga_event_loop/serde_rc"]

hexga_encoding_derive = ["hexga/hexga_encoding_derive", "hexga_graphics/hexga_encoding_derive"] #, "hexga_event_loop/hexga_encoding_derive"]

[dependencies]
hexga.workspace = true
hexga_event_loop.workspace = true
hexga_graphics = { workspace = true, features = ["wgpu"] }
serde = { version = "1.0.0", features = ["derive"], optional = true }
