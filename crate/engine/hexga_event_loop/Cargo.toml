[package]
name = "hexga_event_loop"
version.workspace = true
authors.workspace = true
license.workspace = true
homepage.workspace = true
repository.workspace = true
edition.workspace = true
readme = "README.md"

description = "A multimedia game and software engine for handling graphics, audio, and input."
keywords = ["event_loop", "window", "software"]
categories = ["asynchronous", "game-development"]

[features]
default = [
            "int_are_32_bits", "float_are_32_bits",
            "serde", "serde_rc", #"hexga_encoding_derive"
          ]



int_are_8_bits    = ["hexga_math/int_are_8_bits"]
int_are_16_bits   = ["hexga_math/int_are_16_bits"]
int_are_32_bits   = ["hexga_math/int_are_32_bits"]
int_are_64_bits   = ["hexga_math/int_are_64_bits"]
int_are_size_bits = ["hexga_math/int_are_size_bits"]

float_are_32_bits   = ["hexga_math/float_are_32_bits"]
float_are_64_bits   = ["hexga_math/float_are_64_bits"]
float_are_size_bits = ["hexga_math/float_are_size_bits"]

serde = ["dep:serde", "hexga_core/serde", "hexga_utils/serde", "hexga_math/serde", "hexga_bitflags/serde", "winit/serde"]
serde_rc = ["serde/rc", "hexga_core/serde_rc", "hexga_utils/serde_rc", "hexga_math/serde_rc"]

#hexga_encoding_derive = ["hexga_math/hexga_encoding_derive"]

[dependencies]
hexga_core.workspace = true
hexga_bitflags.workspace = true
hexga_math.workspace = true
hexga_utils.workspace = true

serde = { version = "1.0.0", features = ["derive"], optional = true }
winit = "0.30.11"
smol = "2.0.2"
copypasta = "0.10.2"
log = { version = "0.4.22"}
env_logger = "0.10"


[target.'cfg(target_arch = "wasm32")'.dependencies]
console_log = "1.0"
console_error_panic_hook = "0.1"
wasm-bindgen-futures = "0.4.49"

