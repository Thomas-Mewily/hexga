<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Engine</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{width:100%;height:100%;overflow:hidden;position:fixed}
    body{background:black}
    canvas{position:fixed;top:0;left:0;width:100%;height:100%;display:block;opacity:0;transition:opacity .2s}
    body.loaded canvas{opacity:1}
    .loading{position:fixed;bottom:10px;right:10px;color:#fff8;font:12px monospace;z-index:1000}
    body.loaded .loading{display:none}
    .error{position:fixed;bottom:10px;right:10px;color:#f88;font:12px monospace;display:none;z-index:1000}
    .blackout{position:fixed;top:0;left:0;width:100%;height:100%;background:black;z-index:999;transition:opacity .5s;opacity:1}
    body.loaded .blackout{opacity:0;pointer-events:none}
  </style>
</head>
<body>
  <div class="blackout"></div>
  <canvas id="canvas"></canvas>
  <div class="loading">Loading...</div>
  <div class="error"></div>

  <script type="module">
    let t, m;
    const reload = () => (clearTimeout(t), t = setTimeout(() => location.reload(), 300));
    
    setInterval(async () => {
      const r = await fetch('./pkg/engine_bg.wasm', {cache:'no-store',method:'HEAD'}).catch(()=>null);
      const v = r?.headers.get('last-modified');
      if (v && v !== m && m) reload();
      if (v) m = v;
    }, 500);
    
    try {
      const mod = await import(`./pkg/engine.js?t=${Date.now()}`);
      await mod.default();
      document.body.classList.add('loaded');
      
      // Ensure canvas fills the screen after load
      const canvas = document.getElementById('canvas');
      if (canvas) {
        canvas.style.width = '100%';
        canvas.style.height = '100%';
      }
    } catch(e) {
      console.error(e);
      document.querySelector('.loading').style.display = 'none';
      const errorDiv = document.querySelector('.error');
      errorDiv.textContent = `Error: ${e.message || 'Failed to load engine'}`;
      errorDiv.style.display = 'block';
    }
  </script>
</body>
</html>
